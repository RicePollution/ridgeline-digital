<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36.67 56.16" width="37" height="57">
  <!-- Windows 10 Aero arrow cursor — exact shape from Wikimedia Commons (CC0) -->
  <defs>
    <filter id="aero-shadow" x="-20%" y="-10%" width="160%" height="140%">
      <feDropShadow dx="1.5" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <polygon
    points="18.64 55.17 11.5 38.49 .75 49.08 .75 1.81 34.88 35.94 18.57 36.14 25.83 51.91 18.64 55.17"
    fill="white"
    stroke="#1a1a1a"
    stroke-width="1.5"
    stroke-linejoin="round"
    stroke-miterlimit="10"
    filter="url(#aero-shadow)"/>
</svg>
