<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 11 12" width="11" height="12">
  <!-- Pixel-art Win95 cursor: render tiny, CSS scales up 4x with image-rendering:pixelated -->
  <!-- Black outline -->
  <rect x="0" y="0" width="1" height="1" fill="black"/>
  <rect x="0" y="1" width="1" height="1" fill="black"/>
  <rect x="1" y="1" width="1" height="1" fill="black"/>
  <rect x="0" y="2" width="1" height="1" fill="black"/>
  <rect x="2" y="2" width="1" height="1" fill="black"/>
  <rect x="0" y="3" width="1" height="1" fill="black"/>
  <rect x="3" y="3" width="1" height="1" fill="black"/>
  <rect x="0" y="4" width="1" height="1" fill="black"/>
  <rect x="4" y="4" width="1" height="1" fill="black"/>
  <rect x="0" y="5" width="1" height="1" fill="black"/>
  <rect x="5" y="5" width="1" height="1" fill="black"/>
  <rect x="0" y="6" width="1" height="1" fill="black"/>
  <rect x="6" y="6" width="1" height="1" fill="black"/>
  <rect x="0" y="7" width="1" height="1" fill="black"/>
  <rect x="7" y="7" width="1" height="1" fill="black"/>
  <rect x="0" y="8" width="1" height="1" fill="black"/>
  <rect x="8" y="8" width="1" height="1" fill="black"/>
  <!-- Row 9: elbow — BBB step in middle -->
  <rect x="0" y="9" width="1" height="1" fill="black"/>
  <rect x="5" y="9" width="1" height="1" fill="black"/>
  <rect x="6" y="9" width="1" height="1" fill="black"/>
  <rect x="7" y="9" width="1" height="1" fill="black"/>
  <rect x="9" y="9" width="1" height="1" fill="black"/>
  <!-- Row 10: tail walls -->
  <rect x="0" y="10" width="1" height="1" fill="black"/>
  <rect x="4" y="10" width="1" height="1" fill="black"/>
  <rect x="8" y="10" width="1" height="1" fill="black"/>
  <rect x="10" y="10" width="1" height="1" fill="black"/>
  <!-- Row 11: flat bottoms of head and tail -->
  <rect x="0" y="11" width="5" height="1" fill="black"/>
  <rect x="8" y="11" width="3" height="1" fill="black"/>
  <!-- White fill -->
  <rect x="1" y="2" width="1" height="1" fill="white"/>
  <rect x="1" y="3" width="2" height="1" fill="white"/>
  <rect x="1" y="4" width="3" height="1" fill="white"/>
  <rect x="1" y="5" width="4" height="1" fill="white"/>
  <rect x="1" y="6" width="5" height="1" fill="white"/>
  <rect x="1" y="7" width="6" height="1" fill="white"/>
  <rect x="1" y="8" width="7" height="1" fill="white"/>
  <!-- Row 9 white: 1-4 and 8 -->
  <rect x="1" y="9" width="4" height="1" fill="white"/>
  <rect x="8" y="9" width="1" height="1" fill="white"/>
  <!-- Row 10 white: 1-3 and 9 -->
  <rect x="1" y="10" width="3" height="1" fill="white"/>
  <rect x="9" y="10" width="1" height="1" fill="white"/>
</svg>
